<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAPPY BIRTHDAY🦋</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky-lt: #fce4ec;
        --sky-md: #f8bbd0;
        --sky-dk: #e91e8c;
        --sky-deep: #880e4f;
        --accent: #e91e8c;
        --glass: rgba(255, 255, 255, 0.85);
        --border: rgba(233, 30, 140, 0.18);
        --shadow: rgba(136, 14, 79, 0.08);
        --text: #880e4f;
        --muted: #c2185b;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: "Jost", sans-serif;
        font-weight: 300;
        color: var(--text);
        background: #ffffff;
      }

      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #ffffff;
      }

      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(72px);
        opacity: 0.12;
        z-index: 1;
        animation: blobDrift ease-in-out infinite alternate;
      }
      @keyframes blobDrift {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(30px, -25px) scale(1.08); }
      }
      .ba {
        width: 420px;
        height: 420px;
        background: #f48fb1;
        top: -130px;
        left: -110px;
        animation-duration: 13s;
      }
      .bb {
        width: 300px;
        height: 300px;
        background: #f48fb1;
        bottom: -90px;
        right: -70px;
        animation-duration: 17s;
      }
      .bc {
        width: 200px;
        height: 200px;
        background: #f48fb1;
        top: 38%;
        right: 8%;
        animation-duration: 11s;
      }

      .star {
        position: fixed;
        background: #f48fb1;
        border-radius: 50%;
        z-index: 2;
        pointer-events: none;
        animation: twinkle ease-in-out infinite;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.6); }
      }

      #stage {
        position: relative;
        z-index: 10;
        width: 100vw;
        height: 100vh;
      }
      .page {
        display: none;
        position: absolute;
        inset: 0;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .page.on {
        display: flex;
      }

      .card {
        background: var(--glass);
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
        border: 1.5px solid var(--border);
        border-radius: 30px;
        padding: 44px 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 2px 0 rgba(255,255,255,0.9) inset,
          0 24px 60px var(--shadow),
          0 4px 12px rgba(136, 14, 79, 0.04);
        animation: cardUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
        position: relative;
        overflow: hidden;
      }
      .card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 14px;
        right: 14px;
        height: 1px;
        background: rgba(255,255,255,0.9);
      }
      @keyframes cardUp {
        from { opacity: 0; transform: translateY(36px) scale(0.97); }
        to { opacity: 1; transform: none; }
      }

      .display {
        font-family: "Gilda Display", serif;
        font-size: 30px;
        color: #880e4f;
        line-height: 1.25;
        margin-bottom: 6px;
        letter-spacing: 0.3px;
      }
      .sub {
        font-size: 12px;
        color: #c2185b;
        letter-spacing: 1.1px;
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 32px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 50px;
        font-family: "Jost", sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        cursor: pointer;
        margin-top: 24px;
        transition:
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.25s;
        box-shadow:
          0 6px 24px rgba(136, 14, 79, 0.18),
          0 1px 0 rgba(255,255,255,0.2) inset;
        position: relative;
        overflow: hidden;
      }
      .btn:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 10px 32px rgba(136, 14, 79, 0.28);
      }

      #loadText {
        font-family: "Gilda Display", serif;
        font-size: 20px;
        font-style: italic;
        color: #880e4f;
        min-height: 30px;
      }
      .caret {
        display: inline-block;
        width: 2px;
        height: 20px;
        background: var(--accent);
        vertical-align: middle;
        animation: cBlink 1s infinite;
      }
      @keyframes cBlink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .loadbar {
        width: 220px;
        height: 3px;
        background: rgba(233, 30, 140, 0.12);
        border-radius: 4px;
        margin: 18px auto 0;
        overflow: hidden;
      }
      .loadfill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.05s linear;
      }

      .pin-ring {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 20px 0 22px;
      }
      .ring {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 2px solid #f8bbd0;
        transition: all 0.3s;
      }
      .ring.on {
        background: var(--accent);
        border-color: var(--accent);
        transform: scale(1.25);
        box-shadow: 0 0 12px rgba(233, 30, 140, 0.3);
      }
      .pad {
        display: grid;
        grid-template-columns: repeat(3, 62px);
        gap: 11px;
        justify-content: center;
      }
      .key {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Gilda Display", serif;
        font-size: 20px;
        color: #880e4f;
        background: rgba(252, 228, 236, 0.6);
        border: 1.5px solid rgba(233, 30, 140, 0.15);
        cursor: pointer;
        transition: all 0.2s;
      }
      .key:hover {
        background: rgba(248, 187, 208, 0.7);
        color: #880e4f;
      }

      .score-pill {
        display: inline-flex;
        background: rgba(233, 30, 140, 0.08);
        border: 1px solid rgba(233, 30, 140, 0.18);
        border-radius: 50px;
        padding: 5px 18px;
        font-size: 14px;
        color: #c2185b;
        margin-bottom: 14px;
      }
      #arena {
        width: 100%;
        height: 50vh;
        border-radius: 20px;
        background: rgba(252, 228, 236, 0.3);
        border: 1px solid rgba(233, 30, 140, 0.12);
        overflow: hidden;
        position: relative;
      }
      .h {
        position: absolute;
        font-size: 27px;
        cursor: pointer;
        filter: drop-shadow(0 3px 6px rgba(233, 30, 140, 0.15));
        animation: fall linear forwards;
      }
      @keyframes fall {
        0% { top: -8%; opacity: 0; }
        6% { opacity: 1; }
        100% { top: 108%; opacity: 0; }
      }

      #letter {
        text-align: left;
        font-family: "Gilda Display", serif;
        font-size: 17px;
        font-style: italic;
        line-height: 2;
        color: #880e4f;
        white-space: pre-line;
        padding: 22px 26px;
        background: rgba(252, 228, 236, 0.3);
        border-left: 3px solid var(--accent);
        border-radius: 0 18px 18px 0;
        margin-top: 4px;
        max-height: 50vh;
        overflow-y: auto;
      }

      #winOverlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(136, 14, 79, 0.25);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .win-card {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 32px;
        padding: 50px 46px;
        text-align: center;
        max-width: 340px;
        box-shadow: 0 28px 80px rgba(136, 14, 79, 0.12);
        border: 1.5px solid rgba(233, 30, 140, 0.15);
        position: relative;
      }
      .win-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--accent);
        border-radius: 32px 32px 0 0;
      }
      .win-card p {
        color: #880e4f;
      }

      .photo-wrap {
        position: relative;
        display: inline-block;
        margin-top: 4px;
      }
      .photo-wrap::before {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: 30px;
        border: 2px solid rgba(233, 30, 140, 0.15);
      }
      .slide { display: none; }
      .slide.show { display: block; }
      .slide img {
        width: 210px;
        height: 290px;
        object-fit: cover;
        border-radius: 22px;
        border: 3px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(136, 14, 79, 0.1);
      }
      .sdots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
      }
      .sd {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f8bbd0;
        opacity: 0.4;
      }
      .sd.a {
        opacity: 1;
        background: var(--accent);
        transform: scale(1.5);
      }

      .tracks {
        display: flex;
        flex-direction: column;
        gap: 11px;
        margin-top: 6px;
      }
      .track {
        background: rgba(252, 228, 236, 0.35);
        border-radius: 18px;
        padding: 10px;
        border: 1px solid rgba(233, 30, 140, 0.1);
      }

      @media (max-width: 520px) {
        .card { padding: 30px 20px; }
        .display { font-size: 24px; }
        #arena { height: 44vh; }
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div class="blob ba"></div>
    <div class="blob bb"></div>
    <div class="blob bc"></div>
    <div id="sparks"></div>

    <div id="stage">
      <div class="page on" id="loadPage">
        <div class="card">
          <p id="loadText"><span class="caret"></span></p>
          <div class="loadbar"><div class="loadfill" id="lf"></div></div>
        </div>
      </div>

      <div class="page" id="pinPage">
        <div class="card">
          <p class="sub">MASUKAN PIN ANDA</p>
          <p class="display">Enter PIN 💗</p>
          <div class="pin-ring" id="rings">
            <div class="ring" id="r0"></div>
            <div class="ring" id="r1"></div>
            <div class="ring" id="r2"></div>
            <div class="ring" id="r3"></div>
            <div class="ring" id="r4"></div>
            <div class="ring" id="r5"></div>
          </div>
          <div class="pad">
            <div class="key">1</div>
            <div class="key">2</div>
            <div class="key">3</div>
            <div class="key">4</div>
            <div class="key">5</div>
            <div class="key">6</div>
            <div class="key">7</div>
            <div class="key">8</div>
            <div class="key">9</div>
            <div></div>
            <div class="key">0</div>
            <div></div>
          </div>
          <p id="pinMsg" style="color: #c2185b; font-size: 12px; margin-top: 10px"></p>
        </div>
      </div>

      <div class="page" id="gamePage">
        <div class="card">
          <p class="sub">Mini Game</p>
          <p class="display" style="margin-bottom: 12px">Catch 5 Hearts 💗</p>
          <div class="score-pill">Score <span id="score">0</span> / 5 💗</div>
          <div id="arena"></div>
        </div>
      </div>

      <div class="page" id="bdPage">
        <div class="card">
          <p class="sub">💌 A Letter for My Love</p>
          <p class="display">HAPPY BIRTHDAY SAYANG</p>
          <div id="letter"></div>
          <button class="btn" onclick="go('memPage')">Next →</button>
        </div>
      </div>

      <div class="page" id="memPage">
        <div class="card">
          <p class="sub">📷</p>
          <p class="display" style="margin-bottom: 14px">🤍</p>
          <div class="photo-wrap">
            <div class="slide show" id="sl0"><img src="foto1.jpeg" /></div>
            <div class="slide" id="sl1"><img src="foto2.jpeg" /></div>
            <div class="slide" id="sl2"><img src="foto3.jpeg" /></div>
            <div class="slide" id="sl3"><img src="foto4.jpeg" /></div>
          </div>
          <div class="sdots">
            <div class="sd a" id="sd0"></div>
            <div class="sd" id="sd1"></div>
            <div class="sd" id="sd2"></div>
            <div class="sd" id="sd3"></div>
          </div>
          <button class="btn" onclick="go('musicPage')">Music For You →</button>
        </div>
      </div>

      <div class="page" id="musicPage">
        <div class="card">
          <p class="sub">🎶 Playlist</p>
          <p class="display" style="margin-bottom: 14px">Songs For You</p>
          <div class="tracks">
            <div class="track">
              <iframe src="https://open.spotify.com/embed/track/7F4tV8SiUy6itZTdAzdafO" width="100%" height="80" frameborder="0"></iframe>
            </div>
            <div class="track">
              <iframe src="https://open.spotify.com/embed/track/5y2ijHECwFYWqcAHKTZgzD" width="100%" height="80" frameborder="0"></iframe>
            </div>
            <div class="track">
              <iframe src="https://open.spotify.com/embed/track/3TTZfjYqhTowNALncAmY5v" width="100%" height="80" frameborder="0"></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="winOverlay">
      <div class="win-card">
        <span style="font-size: 50px">💗</span>
        <p class="display" style="font-size: 24px; margin: 10px 0">You Win 💕</p>
        <p style="font-size: 14px; color: #880e4f; line-height: 1.6">
          You caught my heart again 💗
        </p>
        <button class="btn" onclick="openBd()">Open Your Surprise 🎁</button>
      </div>
    </div>

    <script>
      (() => {
        for (let i = 0; i < 70; i++) {
          const s = document.createElement("div");
          s.className = "star";
          const z = Math.random() * 3 + 1;
          s.style.cssText = `width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;`;
          document.getElementById("sparks").appendChild(s);
        }
      })();

      function go(id) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("on"));
        document.getElementById(id).classList.add("on");
        if (id === "memPage") { clearTimeout(sT); si = 0; showSlide(); }
      }

      const str = "PREPARING SOMETHING SWEET FOR YOU 💌";
      let li = 0;
      const ltEl = document.getElementById("loadText");
      const lfEl = document.getElementById("lf");
      (function t() {
        if (li < str.length) {
          ltEl.innerHTML = str.slice(0, ++li) + '<span class="caret"></span>';
          lfEl.style.width = (li / str.length) * 100 + "%";
          setTimeout(t, 80);
        } else {
          setTimeout(() => go("pinPage"), 800);
        }
      })();

      let pin = "";
      document.querySelectorAll(".key").forEach(k => {
        k.addEventListener("click", () => {
          if (pin.length >= 6) return;
          pin += k.innerText;
          for (let i = 0; i < 6; i++)
            document.getElementById("r" + i).classList.toggle("on", i < pin.length);
          if (pin.length === 6) {
            if (pin === "300400") {
              setTimeout(startGame, 300);
            } else {
              const m = document.getElementById("pinMsg");
              m.innerText = "PIN salah coba lagi";
              setTimeout(() => {
                pin = "";
                for (let i = 0; i < 6; i++)
                  document.getElementById("r" + i).classList.remove("on");
                m.innerText = "";
              }, 1000);
            }
          }
        });
      });

      let score = 0, gIv;
      const EM = ["💗","💗","💗","💗"];
      function startGame() {
        go("gamePage");
        score = 0;
        document.getElementById("score").innerText = 0;
        gIv = setInterval(spawnH, 700);
      }
      function spawnH() {
        if (!document.getElementById("gamePage").classList.contains("on")) { clearInterval(gIv); return; }
        const arena = document.getElementById("arena");
        const h = document.createElement("div");
        h.className = "h";
        h.innerText = EM[Math.floor(Math.random() * EM.length)];
        h.style.left = 5 + Math.random() * 90 + "%";
        h.style.animationDuration = 2 + Math.random() * 2 + "s";
        h.onclick = () => {
          score++;
          document.getElementById("score").innerText = score;
          h.remove();
          if (score >= 5) {
            clearInterval(gIv);
            document.getElementById("winOverlay").style.display = "flex";
          }
        };
        arena.appendChild(h);
        setTimeout(() => h.remove(), 4000);
      }

      function openBd() {
        document.getElementById("winOverlay").style.display = "none";
        go("bdPage");
        typeLetter();
      }

      const ltxt = `HAPPY BIRTHDAY GEMASHHH🦋 HAI CANTIKU 💕 TERIMAKASIH SUDAH LAHIR DI DUNIA MENJADI WANITA BAIK DAN KUAT,AKU BANGGA PUNYA KAMU,DOANYA SEMOGA SEGALA SESUATUNYA DIPERMUDAH YAH I LOVE YOU MORE 🦋🌻🤍 HAPPY BIRTHDAY MY HAPPINESS 💓`;
      let lj = 0;
      function typeLetter() {
        lj = 0;
        const el = document.getElementById("letter");
        el.innerHTML = "";
        (function t() {
          if (lj < ltxt.length) {
            el.innerHTML += ltxt[lj++];
            el.scrollTop = el.scrollHeight;
            setTimeout(t, 40);
          }
        })();
      }

      let si = 0, sT;
      function showSlide() {
        for (let i = 0; i < 4; i++) {
          document.getElementById("sl" + i).classList.toggle("show", i === si);
          document.getElementById("sd" + i).classList.toggle("a", i === si);
        }
        si = (si + 1) % 4;
        sT = setTimeout(showSlide, 2500);
      }
    </script>
  </body>
</html>
